<!DOCTYPE html>
<html>
<head>
    <title>Historical Map Collection</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100%;
            height: 80vh;
        }
        .leaflet-control {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .leaflet-left .leaflet-control {
            margin-left: 10px;
        }
        .leaflet-right .leaflet-control {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize the map centered on Philadelphia
        const map = L.map('map').setView([39.9526, -75.1652], 12);

        // Define all basemaps with year information
        const basemaps = [
            // Historical maps sorted by year
            { name: "Barnes 1867", layer: L.tileLayer('https://mapwarper.net/mosaics/tile/2278/{z}/{x}/{y}.png'), year: 1867 },
            // ... [rest of your basemaps remain unchanged] ...
            { name: "Army Plume 4", layer: L.tileLayer('https://mapwarper.net/maps/tile/88817/{z}/{x}/{y}.png') }
        ];

        // Sort basemaps by year (those without years at the bottom)
        basemaps.sort((a, b) => {
            if (a.year && b.year) return a.year - b.year;
            if (a.year) return -1;
            if (b.year) return 1;
            return a.name.localeCompare(b.name);
        });

        // Create an object for the layer control
        const baseLayers = {};
        basemaps.forEach(bm => {
            baseLayers[bm.name] = bm.layer;
        });

        // Add default basemap
        baseLayers["OSM Streets"].addTo(map);

        // Create overlay layers
        const overlays = {
            "City Boundaries": L.layerGroup(),
            "Landmarks": L.layerGroup(),
            "Transportation": L.layerGroup(),
            "FEMA 100 year floodplain": L.layerGroup()  // Added new overlay
        };

        // Function to load GeoJSON data
        async function loadGeoJSON(url, layerGroup, style) {
            try {
                const response = await fetch(url);
                const data = await response.json();
                L.geoJSON(data, {
                    style: style
                }).addTo(layerGroup);
            } catch (error) {
                console.error('Error loading GeoJSON:', error);
            }
        }

        // Load sample Philadelphia GeoJSON data
        loadGeoJSON('https://raw.githubusercontent.com/azavea/geo-data/master/Neighborhoods_Philadelphia/Neighborhoods_Philadelphia.geojson', 
                   overlays["City Boundaries"], {color: 'blue', weight: 2, fillOpacity: 0.1});
        
        loadGeoJSON('https://opendata.arcgis.com/datasets/4bf20a4b5eeb4f2f85e35a6ecc2a3c11_0.geojson', 
                   overlays["Landmarks"], {color: 'red', radius: 5, fillOpacity: 0.8});
        
        loadGeoJSON('https://opendata.arcgis.com/datasets/b54ec5210cee41c3a884c9086f7af1be_0.geojson', 
                   overlays["Transportation"], {color: 'navy', weight: 2});
        
        // Load FEMA 100-year floodplain data with blue semi-transparent fill
        loadGeoJSON('https://raw.githubusercontent.com/benliebersohn/petrosylvania-collection-builder/main/_includes/js/FEMA_100yr_floodplain.geojson', 
                   overlays["FEMA 100 year floodplain"], {
                       color: '#0066ff',
                       weight: 2,
                       fillColor: '#0066ff',
                       fillOpacity: 0.3
                   });

        // Create overlay control (left side)
        const overlayControl = L.control.layers(null, overlays, {
            collapsed: false,
            position: 'topleft'
        }).addTo(map);

        // Create basemap control (right side)
        const basemapControl = L.control.layers(baseLayers, null, {
            collapsed: false,
            position: 'topright'
        }).addTo(map);
    </script>
</body>
</html>
