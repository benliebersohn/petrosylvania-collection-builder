        }

            clear: both; /* Ensures it stays below */
        }
        /* Add a scrollbar and limit the size of the basemap control. */
        .scrollable-basemap-control {
            /* Parent container - NO overflow here */
            overflow: visible;
        }

          max-height: 80vh;
          overflow-y: scroll;

            width: 12px;
            background: rgba(0,0,0,0.05);

                border-radius: 8px;
                border: 2px solid #f1f1f1;
            }

          .scrollable-basemap-control .leaflet-control-layers-list {

        }

            top: 0;
            background: white;
            z-index: 1;

        .aoi-label {

        // Function to load GeoJSON data
        async function loadGeoJSON(url, layerGroup, style) {
            try {
                const response = await fetch(url);
                const data = await response.json();
                L.geoJSON(data, {
                    style: style
                }).addTo(layerGroup);
            } catch (error) {
                console.error('Error loading GeoJSON:', error);
            }
        }

                L.geoJSON(data, {
                    style: style,
                    onEachFeature: onEachFeature
                }).addTo(layerGroup);
            } catch (error) {

    },
    function(feature, layer) {
        // Create label for each ZIP code
        const center = layer.getBounds().getCenter();
        const label = L.marker(center, {
            icon: L.divIcon({
                className: 'zip-code-label',
                html: `<div>${feature.properties.CODE}</div>`,
                iconSize: [50, 20]
            }),
            interactive: false,
            zIndexOffset: 1000
        });
        
        // Store reference to the label on the layer
        layer._label = label;
        
        // When layer is added to map (turned on), add its label
        layer.on('add', function() {
            label.addTo(zipCodeLabels);
        });
        
        // When layer is removed from map (turned off), remove its label
        layer.on('remove', function() {
            zipCodeLabels.removeLayer(label);
        });
    }

            const label = L.DomUtil.create('h4', 'control-label', container);
            label.textContent = title;
            L.DomUtil.addClass(container, 'labeled-control');
    
    // Move the label to be the first child of the container
            container.insertBefore(label, container.firstChild);
    
        return container;
