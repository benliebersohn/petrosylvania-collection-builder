<!DOCTYPE html>
<html>
<head>
    <title>Dual Layer Control Leaflet Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
        
        /* Custom control styling */
        .custom-control {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        
        /* Left control specific styling */
        .leaflet-left .leaflet-control {
            margin-left: 10px;
        }
        
        /* Right control specific styling */
        .leaflet-right .leaflet-control {
            margin-right: 10px;
        }
        
        /* Ensure the control panels have proper z-index */
        .leaflet-top {
            z-index: 1000;
        }
        
        /* Style the layer control lists */
        .leaflet-control-layers-list {
            background: white;
            padding: 5px;
            border-radius: 4px;
        }
        
        /* Add some spacing between controls */
        .leaflet-control-layers {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize the map
        const map = L.map('map').setView([39.8283, -98.5795], 4); // Center on USA

        // Define basemaps (WMS layers)
        const basemaps = {
            "OpenStreetMap": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }),
            "USGS Topo": L.tileLayer.wms('https://basemap.nationalmap.gov/arcgis/services/USGSTopo/MapServer/WMSServer', {
                layers: '0',
                format: 'image/png',
                transparent: true,
                attribution: 'USGS'
            }),
            "Satellite": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
            })
        };

        // Add default basemap
        basemaps.OpenStreetMap.addTo(map);

        // Create overlay layers (initially empty, will be populated with GeoJSON)
        const overlays = {
            "States": L.layerGroup(),
            "Cities": L.layerGroup(),
            "Rivers": L.layerGroup()
        };

        // Function to load GeoJSON data
        async function loadGeoJSON(url, layerGroup, style) {
            try {
                const response = await fetch(url);
                const data = await response.json();
                L.geoJSON(data, {
                    style: style
                }).addTo(layerGroup);
            } catch (error) {
                console.error('Error loading GeoJSON:', error);
            }
        }

        // Load sample GeoJSON data
        loadGeoJSON('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json', 
                   overlays.States, {color: 'blue', weight: 2, fillOpacity: 0.1});
        
        loadGeoJSON('https://d2ad6b4ur7yvpq.cloudfront.net/naturalearth-3.3.0/ne_50m_populated_places.geojson', 
                   overlays.Cities, {color: 'red', radius: 5, fillOpacity: 0.8});
        
        loadGeoJSON('https://d2ad6b4ur7yvpq.cloudfront.net/naturalearth-3.3.0/ne_50m_rivers_lake_centerlines.geojson', 
                   overlays.Rivers, {color: 'navy', weight: 2});

        // Create overlay control (left side)
        const overlayControl = L.control.layers(null, overlays, {
            collapsed: false,
            position: 'topleft'
        }).addTo(map);

        // Create basemap control (right side)
        const basemapControl = L.control.layers(basemaps, null, {
            collapsed: false,
            position: 'topright'
        }).addTo(map);

        // Add custom class to the control containers
        document.querySelector('.leaflet-control-layers').classList.add('custom-control');
        document.querySelectorAll('.leaflet-control-layers')[1].classList.add('custom-control');
    </script>
</body>
</html>
