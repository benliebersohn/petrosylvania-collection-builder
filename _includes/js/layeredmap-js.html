<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.fullscreen@2.4.0/Control.FullScreen.min.css" />
    <script>
        // Suppress livereload.js errors - it may not be available but isn't critical
        window.addEventListener('error', function(event) {
            if (event.filename && event.filename.includes('livereload.js')) {
                event.preventDefault();
            }
        }, true);
    </script>
    <style>

        #map {
            width: 100%;
            height: 90vh;
        }
         .leaflet-control-attribution svg { /* Hides Ukraine flag, attempt to hide attribution */
             width:0
         }
        .aoi-multiline-label {
            text-align: center;
            line-height: 1.2;
        }
        .label-container {
            background: rgba(255,255,255,.5);
            padding: 2px 4px;
            border-radius: 1px;
        }
        .info.legend {
            background-color: white;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #999;
        }
        .aoi-number {
            font-weight: 600;
            font-size: 16px;
        }
        .area-name {
            font-size: 12px;
            font-weight: 600;
        }

        .custom-fullscreen {
            background: white;
            padding: 5px;
            border-radius: 1px;
            border: 2px solid rgba(0,0,0,0.2);
            cursor: pointer;
        }
        
        .custom-fullscreen:hover {
            background: #f4f4f4;
        }
        
        /* Combined zoom + fullscreen control */
        .leaflet-control-combined {
            background: white;
            border-radius: 1px;
            border: 1px solid #ccc;
            display: flex;
            flex-direction: row;
            gap: 0;
            padding: 0 !important;
            margin: 0 !important;
            bottom: 0px !important;
             right: 0px !important;
             z-index: 1000;
        }
        
        .control-button {
            width: 26px;
            height: 26px;
            border: none;
            background: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: #555;
            padding: 0;
            line-height: 26px;
            text-align: center;
            transition: background-color 0.2s;
        }
        
        .control-button:not(:last-child) {
            border-right: 1px solid #ddd;
        }
        
        .control-button:hover {
            background-color: #f0f0f0;
        }
        
        .control-button:active {
            background-color: #e0e0e0;
        }

        /* River Point Label Styles */
        .river-point-icon {
            background: transparent;
            border: none;
        }
        
        .river-point-label-left {
            /* Default: label extends to the right from the point */
            transform: translateX(0);
        }
        
        .river-point-label-right {
            /* Shift label to the left so point is at right edge */
            transform: translateX(-100%);
        }

        .aoi-label {      
          -webkit-text-stroke: 1px rgba(255, 255, 255, 0.34); /* Improves readability */
          position: absolute;
          text-align: center;
          transform: translate(-50%, -50%);
          pointer-events: none;
          font-family: 'system-ui', sans-serif;
          font-weight: 650;
          color: black;
        }

        .river-point-label {
            background: white;
            padding: 2px 6px;
            border-radius: 1px;
            border: 1px solid #ccc;
            font-family: system-ui, sans-serif;
            font-size: 13px;
            font-weight: 400;
            color: #000000;
            white-space: nowrap;
            letter-spacing: 0.3px;
            display: inline-block;
        }

        .zip-code-label {
            font-family: system-ui, sans-serif !important;
            font-size: 13px !important;
            font-weight: 400 !important;
            color: #000000 !important;
            background: white !important;
            padding: 2px 6px !important;
            border-radius: 1px !important;
            border: 1px solid #ccc !important;
            letter-spacing: 0.3px !important;
            display: inline-block !important;
            white-space: nowrap !important;
            width: auto !important;
            height: auto !important;
            }

        .ward-label {
            font-family: system-ui, sans-serif !important;
            font-size: 12px !important;
            font-weight: 600 !important;
            color: #333333 !important;
            background: white !important;
            padding: 3px 6px !important;
            border-radius: 1px !important;
            border: 1px solid #666 !important;
            letter-spacing: 0.2px !important;
            display: inline-block !important;
            white-space: nowrap !important;
            width: auto !important;
            height: auto !important;
            }

        /* Leaflet control styling for custom panels */
        .leaflet-control-custom-panel {
            background: white !important;
            border-radius: 1px;
            border: 1px solid #ccc !important;
            display: flex;
            flex-direction: column;
            max-height: 70vh;
            width: auto;
            max-width: 500px;
            min-width: 200px;
            overflow: hidden;
            z-index: 400;
        }

        /* Overlays control */
        .leaflet-control-overlays-panel {
            max-height: 60vh;
            border: 1px solid #ccc !important;
            fill: solid white !important;
            border-radius: 1px;
            padding: 0 !important;
            margin: 0 !important;
            box-shadow: none !important;
            background: white !important;
        }

        .leaflet-control-overlays-panel .leaflet-control-layers {
            background: white !important;
            border: none;
            box-shadow: none;
            font-family: system-ui, sans-serif;
            overflow: visible;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
            width: auto;
        }

        .leaflet-control-overlays-panel .leaflet-control-layers-list {
            border: none !important;
            box-shadow: none !important;
            background: white !important;
            max-height: 100% !important;
            overflow-y: auto !important;
            font-family: system-ui, sans-serif;
            flex-grow: 1;
            min-height: 0;
            padding: 5px !important;
            fill: white !important;
        }

        /* Base Maps control */
        .leaflet-control-basemaps-panel {
            height: calc(90vh - 26px) !important;
            border: black solid 1px !important;
            border-radius: 1px;
            padding: 0 !important;
            margin: 0 !important;
            box-shadow: none !important;
            background: white !important;
            display: flex;
            flex-direction: column;
            min-height: 0;
            box-sizing: border-box !important;
            width: 100% !important;
        }

        /* Ensure outer Leaflet wrapper for basemaps doesn't constrain it */
        .leaflet-top.leaflet-right {
            width: auto !important;
            height: auto !important;
            max-height: none !important;
        }

        .leaflet-control-basemaps-panel .leaflet-control-layers {
            background: white !important;
            border: none;
            box-shadow: none;
            font-family: system-ui, sans-serif;
            max-height: none;
            overflow: hidden;
            width: auto !important;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
            flex-grow: 1;
        }

        .leaflet-control-basemaps-panel .leaflet-control-layers-list {
            border: none !important;
            box-shadow: none !important;
            background: white !important;
            max-height: none !important;
            overflow-y: auto !important;
            font-family: system-ui, sans-serif !important;
            width: auto !important;
            white-space: nowrap !important;
            flex-grow: 1 !important;
            min-height: 0 !important;
            padding: 1px 1px 1px 5px !important;
        }

        .leaflet-control-basemaps-panel .control-label {
            max-width: 330px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .leaflet-control-basemaps-panel .leaflet-control-layers-base {
            border: none !important;
        }

        /* Override Leaflet default 2px border on touch devices */
        .leaflet-touch .leaflet-control-basemaps-panel,
        .leaflet-control-basemaps-panel.leaflet-control-layers {
            border: 1px solid #ccc !important;
        }

        /* Collapse/Toggle button styling - unified for all panels */
        .collapse-toggle,
        .legend-toggle {
            width: 18px;
            height: 18px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #555 !important;
            padding: 0;
            transition: background-color 0.2s;
            flex-shrink: 0;
            transform: translateY(0px);
            line-height: 1;
            user-select: none;
        }

        .collapse-toggle:hover,
        .legend-toggle:hover {
            background-color: #f6f6f6;
        }

        .leaflet-control-layers:not(.collapsed) .collapse-toggle::after {
            content: '−';
        }

        .leaflet-control-layers.collapsed .collapse-toggle::after {
            content: '+';
        }

        /* Flex container for control label with button */
        .control-label-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin: 0;
            padding: 6px 8px 6px 8px !important;
            border-bottom: 1px solid #999;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 1) !important;
        }

        /* Collapsed state for control containers */
        .leaflet-control-layers.collapsed {
            max-height: 32px !important;
            overflow: hidden !important;
        }

        .leaflet-control-layers.collapsed .leaflet-control-layers-list {
            display: none !important;
        }
        
        /* Ensure collapsed state overrides section-specific rules */
        #basemaps-section .leaflet-control-layers.collapsed {
            max-height: 32px !important;
            overflow: hidden !important;
        }
        
        #overlays-section .leaflet-control-layers.collapsed {
            max-height: 32px !important;
            overflow: hidden !important;
        }

        /* Legend control */
        .leaflet-control-legend-panel {
            max-height: 50vh;
            bottom: -10px !important;
            left: -10px !important;
        }

        .leaflet-control-legend-panel .leaflet-control-layers.legend-control {
            background: transparent;
            border: none;
            font-family: system-ui, sans-serif;
            overflow: visible;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
            box-shadow: none;
            width: auto;
        }

        .leaflet-control-legend-panel .leaflet-control-layers.legend-control.collapsed {
            max-height: 32px !important;
            overflow: hidden !important;
        }

        .leaflet-control-legend-panel .leaflet-control-layers.legend-control.collapsed .master-legend-content {
            display: none !important;
        }

        .leaflet-control-legend-panel .master-legend-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 10px 10px 10px;
            min-height: 0;
        }

        .master-legend-content i {
            display: inline-block;
            margin-right: 8px;
        }

        .legend-separator {
            height: 1px;
            background-color: #999;
            margin: 8px 0;
        }

        .leaflet-control-attribution {
           background: white !important;
           border: 1px solid #ccc !important;
           border-radius: 1px;
           padding: 2px 2px !important;
           font-family: system-ui, sans-serif;
           font-size: 10px !important;
           font-weight: 400 !important;
           color: #000000 !important;
           letter-spacing: 0.3px !important;
           display: inline-block !important;
           white-space: nowrap !important;
           bottom: 0px !important;
           left: 0px !important;
           z-index: 500;
        }

        /* Scrollbar styling - unified for all panels */
        .leaflet-control-layers-list::-webkit-scrollbar,
        .master-legend-content::-webkit-scrollbar {
            width: 10px;
            background: rgba(0,0,0,0.05);
        }

        .leaflet-control-layers-list::-webkit-scrollbar-thumb,
        .master-legend-content::-webkit-scrollbar-thumb {
            background: #999;
            border-radius: 5px;
            border: 2px solid white;
        }

        .leaflet-control-layers-list::-webkit-scrollbar-thumb:hover,
        .master-legend-content::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        /* Ensure layer item containers fill available width */
        .leaflet-control-layers-base,
        .leaflet-control-layers-overlays {
            width: 100%;
            box-sizing: border-box;
        }

        /* Ensure labels fill width for proper text wrapping */
        .leaflet-control-layers-base label,
        .leaflet-control-layers-overlays label {
            width: 100%;
            display: flex;
            align-items: center;
            margin-bottom: 4px; 
        }

        .leaflet-control-layers-base label span,
        .leaflet-control-layers-overlays label span {
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.fullscreen@2.4.0/Control.FullScreen.min.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>

    <script>
        // Wait for stylesheets to load before initializing map
        // This prevents "Layout was forced before page was fully loaded" warning
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeMap);
        } else {
            // DOM is already ready (script loaded after DOMContentLoaded)
            initializeMap();
        }

        function initializeMap() {
            // Initialize the map on the lower schuylkill river
            const map = L.map('map',{attributionControl: false, zoomControl: false}).setView([39.917359, -75.204920], 14);
            //create a top pane for the AOI labels,
            L.control.attribution({position: 'bottomleft'}).addTo(map);

            map.attributionControl.setPrefix()
        
        // Create custom combined zoom + fullscreen control
        const CombinedControl = L.Control.extend({
            onAdd: function(map) {
                const container = L.DomUtil.create('div', 'leaflet-control leaflet-control-combined');
                container.innerHTML = '<button class="control-button zoom-in" title="Zoom in">+</button>' +
                                      '<button class="control-button zoom-out" title="Zoom out">\u2212</button>' +
                                      '<button class="control-button fullscreen-btn" title="Fullscreen">\u26f6</button>';
                
                L.DomEvent.on(container.querySelector('.zoom-in'), 'click', () => map.zoomIn());
                L.DomEvent.on(container.querySelector('.zoom-out'), 'click', () => map.zoomOut());
                L.DomEvent.on(container.querySelector('.fullscreen-btn'), 'click', () => {
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    } else {
                        document.getElementById('map').requestFullscreen();
                    }
                });
                return container;
            }
        });
        
        new CombinedControl({position: 'bottomright'}).addTo(map);

        map.createPane('topPane').style.zIndex = 650;
        //map.attributionControl.setPrefix(false)
        const historicalMap = L.tileLayer('https://mapwarper.net/maps/tile/94844/{z}/{x}/{y}.png', {
            attribution: 'Historical map from <a href="https://mapwarper.net">MapWarper</a>',
            maxZoom: 18,
            minZoom: 10,
            pane: 'topPane', // this is what makes it stay on top
            tms: false,
            crossOrigin: true,
            detectRetina: false,
            noWrap: true
        });
        var permanentOSM = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
            minZoom: 0,
            maxZoom: 19,
            // Keep this layer at the very bottom
            pane: 'tilePane' // Leaflet's lowest-level pane
        }).addTo(map);
        
        // Define all basemaps with year information
        const basemaps = [
            // Historical maps sorted by year
            { name: "1867 Barnes", layer: L.tileLayer('https://mapwarper.net/mosaics/tile/2278/{z}/{x}/{y}.png', {
                 attribution: 'Free Library of Philadelphia'
            }), year: 1867 },
            { name: "1876 Hopkins", layer: L.tileLayer('https://mapwarper.net/mosaics/tile/2465/{z}/{x}/{y}.png', {
                 attribution: 'Free Library of Philadelphia'
            }), year: 1876 },
            { name: "1892 Waterfront", layer: L.tileLayer('https://mapwarper.net/maps/tile/91523/{z}/{x}/{y}.png', {
                 attribution: 'Free Library of Philadelphia'
            }), year: 1892 },
            { name: "1894 USGS", layer: L.tileLayer('https://mapwarper.net/maps/tile/88560/{z}/{x}/{y}.png', {
                attribution: 'USGS'
            }), year: 1894 },
            { name: "1895 Bromley", layer: L.tileLayer('https://mapwarper.net/mosaics/tile/2184/{z}/{x}/{y}.png', {
                 attribution: 'Free Library of Philadelphia'
            }), year: 1895 },
            { name: "1897 Baist City Map", layer: L.tileLayer('https://mapwarper.net/maps/tile/104328/{z}/{x}/{y}.png', {
                 attribution: 'Free Library of Philadelphia'
            }), year: 1897 },
            { name: "1901 Bromley", layer: L.tileLayer('https://mapwarper.net/mosaics/tile/2272/{z}/{x}/{y}.png', {
                 attribution: 'Free Library of Philadelphia'
            }), year: 1901 },
            { name: "1910 Bromley", layer: L.tileLayer('https://mapwarper.net/mosaics/tile/2271/{z}/{x}/{y}.png', {
                 attribution: 'Free Library of Philadelphia'
            }), year: 1910 },
            { name: "1914 Sewage Plan", layer: L.tileLayer('https://mapwarper.net/maps/tile/104320/{z}/{x}/{y}.png', {
                 attribution: 'Free Library of Philadelphia'
            }), year: 1914 },
            { name: "1920 USGS", layer: L.tileLayer('https://mapwarper.net/maps/tile/88561/{z}/{x}/{y}.png', {
                attribution: 'USGS'
            }), year: 1920 },
            { name: "1928 aerial", layer: L.tileLayer('https://mapwarper.net/maps/tile/88306/{z}/{x}/{y}.png', {
                 attribution: 'Delaware Valley Regional Planning Comission'
            }), year: 1928 },
            { name: "1937 HOLC", layer: L.tileLayer('https://mapwarper.net/maps/tile/90758/{z}/{x}/{y}.png', {
                 attribution: 'Mapping Inequality'
            }), year: 1937 },
            { name: "1942 land use", layer: L.tileLayer('https://mapwarper.net/maps/tile/94403/{z}/{x}/{y}.png', {
                 attribution: 'Free Library of Philadelphia'
            }), year: 1942 },
            { name: "1949 USGS", layer: L.tileLayer('https://mapwarper.net/maps/tile/88564/{z}/{x}/{y}.png', {
                attribution: 'USGS'
            }), year: 1949 },
            { name: "1959 aerial", layer: L.tileLayer('https://mapwarper.net/maps/tile/88304/{z}/{x}/{y}.png', {
                 attribution: 'Delaware Valley Regional Planning Comission'
            }), year: 1959 },
            { name: "1962 land use", layer: L.tileLayer('https://mapwarper.net/maps/tile/94678/{z}/{x}/{y}.png', {
                 attribution: 'Free Library of Philadelphia'
            }), year: 1962 },
            { name: "1965 aerial", layer: L.tileLayer('https://mapwarper.net/maps/tile/88299/{z}/{x}/{y}.png', {
                 attribution: 'Delaware Valley Regional Planning Comission'
            }), year: 1965 },
            { name: "1967 USGS", layer: L.tileLayer('https://mapwarper.net/maps/tile/88567/{z}/{x}/{y}.png', {
                attribution: 'USGS'
            }), year: 1967 },
            { name: "1975 aerial", layer: L.tileLayer('https://mapwarper.net/maps/tile/88571/{z}/{x}/{y}.png', {
                 attribution: 'Delaware Valley Regional Planning Comission'
            }), year: 1975 },
            { name: "1980 aerial", layer: L.tileLayer('https://mapwarper.net/maps/tile/88301/{z}/{x}/{y}.png', {
                 attribution: 'Delaware Valley Regional Planning Comission'
            }), year: 1980 },
            { name: "1985 aerial", layer: L.tileLayer('https://mapwarper.net/maps/tile/88295/{z}/{x}/{y}.png', {
                 attribution: 'Delaware Valley Regional Planning Comission'
            }), year: 1985 },
            { name: "1990 aerial", layer: L.tileLayer('https://mapwarper.net/maps/tile/90707/{z}/{x}/{y}.png', {
                 attribution: 'Delaware Valley Regional Planning Comission'
            }), year: 1990 },
            { name: "1995 aerial", layer: L.tileLayer('https://mapwarper.net/maps/tile/95829/{z}/{x}/{y}.png', {
                 attribution: 'Delaware Valley Regional Planning Comission'
            }), year: 1995 },
            { name: "1995 USGS", layer: L.tileLayer('https://mapwarper.net/maps/tile/88568/{z}/{x}/{y}.png', {
                attribution: 'USGS'
            }), year: 1995 },
            { name: "2019 satellite", layer: L.tileLayer.wms('https://imagery.pasda.psu.edu/arcgis/services/pasda/PhiladelphiaImagery2019/MapServer/WMSServer', {
                layers: '2',
                format: 'image/png',
                transparent: true,
                attribution: 'Delaware Valley Regional Planning Comission',
                crossOrigin: 'anonymous',
                version: '1.3.0'
            }), year: 2019 },
            { name: "2019 USGS", layer: L.tileLayer('https://mapwarper.net/maps/tile/88569/{z}/{x}/{y}.png', {
                attribution: 'USGS'
            }), year: 2019 },
            { name: "2019 aerial", layer: L.esri.tiledMapLayer({
                url: 'https://tiles.arcgis.com/tiles/fLeGjb7u4uXqeF9q/arcgis/rest/services/CityImagery_2019_3in/MapServer',
                attribution: 'Esri - Philadelphia 2019 Imagery'
            }), year: 2019 },
            { name: "2023 USGS", layer: L.tileLayer('https://mapwarper.net/maps/tile/88570/{z}/{x}/{y}.png', {
                attribution: 'USGS'
            }), year: 2023 },
            
            // Modern reference maps (no year)
            { name: "Google Earth", layer: L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
                 attribution: 'Google'
            }) },
            { name: "ESRI satellite", layer: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {attribution: 'ESRI'}) },
            { name: "ESRI NatGeo", layer: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}', {attribution: 'ESRI'}) },
            { name: "ESRI StreetMap", layer: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {attribution: 'ESRI'}) },
            { name: "OpenStreetMap", layer: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution: 'OSM Contributors'}) },
        ];

        // Sort basemaps by year (those without years at the bottom)
        basemaps.sort((a, b) => {
            if (a.year && b.year) return a.year - b.year;
            if (a.year) return -1;
            if (b.year) return 1;
            return a.name.localeCompare(b.name);
        });

        // Create an object for the layer control
        const baseLayers = {};
        basemaps.forEach(bm => {
            baseLayers[bm.name] = bm.layer;
        });

        
        const aoiLabels = L.layerGroup()
        const aoiBoundaries = L.layerGroup()

        // Add default basemap
        baseLayers["ESRI StreetMap"].addTo(map);
        
        const overlays = {
            "Street labels": L.tileLayer('https://a.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}.png', {pane: 'topPane', attribution: 'CartoDB'}),
            "Areas of Interest (AOI)": L.layerGroup([aoiBoundaries, aoiLabels]),
            "Philadelphia County": L.layerGroup(),
            "Political Ward Boundaries, 2025": L.layerGroup(),
            "River Points": L.layerGroup(),
            "ZIP Codes, 2025": L.layerGroup(),
            "Industrial zones": L.layerGroup(),
            "Percent industrial, 2026": L.layerGroup(),
            'HOLC "redlining" map, 1937': L.layerGroup(),
            "LNAPL plume, 1996A": L.tileLayer('https://mapwarper.net/maps/tile/88772/{z}/{x}/{y}.png', {attribution: 'US Army Corps of Engineers'}),

        // Function to load GeoJSON data
async function loadGeoJSON(url, targetLayer, options = {}) {
  try {
    const response = await fetch(url);
    const data = await response.json();
    
    const geoJsonLayer = L.geoJSON(data, {
      style: options.style || {},
      onEachFeature: options.onEachFeature,
      pointToLayer: options.pointToLayer  // ADD THIS LINE
    });
    
    if (targetLayer && targetLayer.addLayer) {
      targetLayer.addLayer(geoJsonLayer);
    }
    
    // Add attribution if provided
    if (options.attribution && map && map.attributionControl) {
      map.attributionControl.addAttribution(options.attribution);
    }
    
    return geoJsonLayer;
  } catch (error) {
    console.error('Error loading GeoJSON:', error);
    return null;
  }
}

// Function to update the master legend in dashboard
function updateMasterLegend() {
    const legendContainer = window._legendContainer;
    const legendControl = window._legendControl;
    const legendContent = window._legendContent;
    
    if (Object.keys(activeLegendSections).length === 0) {
        // No active legends - hide the entire panel and collapse
        if (legendContainer) {
            legendContainer.style.display = 'none';
        }
        legendControl.classList.add('collapsed');
        legendContent.innerHTML = '';
        return;
    }
    
    // Active legends exist - show and expand the section
    if (legendContainer) {
        legendContainer.style.display = 'block';
    }
    legendControl.classList.remove('collapsed');
    
    // Rebuild legend content
    if (legendContent) {
        var labels = [];
        var sectionCount = 0;
        for (var layerName in activeLegendSections) {
            if (activeLegendSections[layerName]) {
                // Add separator between sections (but not before first section)
                if (sectionCount > 0) {
                    labels.push('<div class="legend-separator"></div>');
                }
                var section = legendSections[layerName];
                labels.push('<strong>' + section.title + '</strong>');
                section.items.forEach(function(item) {
                    var borderStyle = item.border && item.border !== 'none' ? 'border: ' + item.border + ';' : '';
                    labels.push(
                        '<i style="background: ' + item.color + '; width: 18px; height: 18px; display: inline-block; margin-right: 8px;' + borderStyle + '"></i> ' +
                        item.label
                    );
                });
                sectionCount++;
            }
        }
        // Join labels with <br>, but handle separator specially
        legendContent.innerHTML = labels.map(function(label) {
            return label.includes('legend-separator') ? label : label;
        }).join('<br>').replace(/<br><div class="legend-separator"><\/div><br>/g, '<div class="legend-separator"></div>');
    }
}

        // Dynamic sizing: Overlays panel shrinks/grows based on Legend height
        function updateOverlaysPanelHeight() {
            const mapEl = document.getElementById('map');
            const overlaysPanel = document.querySelector('.leaflet-control-overlays-panel');
            const overlaysList = overlaysPanel ? overlaysPanel.querySelector('.leaflet-control-layers-list') : null;
            const overlaysControl = overlaysPanel ? overlaysPanel.querySelector('.leaflet-control-layers') : null;
            const legendPanel = document.querySelector('.leaflet-control-legend-panel');
            const attribution = document.querySelector('.leaflet-control-attribution');
            
            if (!mapEl || !overlaysPanel) {
                console.log('Sizing: Missing mapEl or overlaysPanel');
                return;
            }
            
            // Get viewport height
            const mapHeight = mapEl.clientHeight;
            
            // Get legend height (only if visible)
            let legendHeight = 0;
            if (legendPanel && legendPanel.style.display !== 'none') {
                legendHeight = legendPanel.offsetHeight;
            }
            
            // Get attribution height
            const attributionHeight = attribution ? attribution.offsetHeight : 20;
            
            // Get overlays header height
            const overlaysHeader = overlaysPanel.querySelector('.control-label-container');
            const headerHeight = overlaysHeader ? overlaysHeader.offsetHeight : 40;
            
            // Calculate available height for overlays with 10px buffer between panels
            const buffer = 10;
            const calculatedHeight = mapHeight - legendHeight - attributionHeight - buffer - headerHeight;
            
            // Apply the calculated height with a minimum of 150px to keep usable
            const minHeight = 120;
            const finalHeight = Math.max(calculatedHeight, minHeight);
            
            // Apply to outer panel
            overlaysPanel.style.setProperty('max-height', (finalHeight + headerHeight) + 'px', 'important');
            
            // Apply to inner list to make it scrollable
            if (overlaysList) {
                overlaysList.style.setProperty('max-height', finalHeight + 'px', 'important');
            }
            
            console.log('Overlays size: finalHeight=' + finalHeight + 'px, total=' + (finalHeight + headerHeight) + 'px (header=' + headerHeight + 'px, legend=' + legendHeight + 'px, map=' + mapHeight + 'px, attribution=' + attributionHeight + 'px)');
        }
        
        // Update on load
        setTimeout(updateOverlaysPanelHeight, 500);
        
        // Update on window resize
        window.addEventListener('resize', updateOverlaysPanelHeight);
        
        // Update when legend expands/collapses
        const legendCollapseObserver = setInterval(() => {
            const legendPanel = document.querySelector('.leaflet-control-legend-panel');
            if (legendPanel) {
                clearInterval(legendCollapseObserver);
                // Monitor for class changes (collapse/expand)
                const legendControl = legendPanel.querySelector('.legend-control');
                if (legendControl) {
