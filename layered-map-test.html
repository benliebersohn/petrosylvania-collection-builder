<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.fullscreen@2.4.0/Control.FullScreen.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>

        #map {
            width: 100%;
            height: 90vh;
        }
         .leaflet-control-attribution svg { /* Hides Ukraine flag, attempt to hide attribution */
             width:0
         }
        .aoi-multiline-label {
            text-align: center;
            line-height: 1.2;
        }
        .label-container {
            background: rgba(255,255,255,.5);
            padding: 2px 4px;
            border-radius: 1px;
        }
        .info.legend {
            background-color: white;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #999;
        }
        .aoi-number {
            font-weight: 800;
            font-size: 16px;
        }
        .area-name {
            font-size: 14px;
            font-weight: 800;
        }

        .custom-fullscreen {
            background: white;
            padding: 5px;
            border-radius: 4px;
            border: 2px solid rgba(0,0,0,0.2);
            cursor: pointer;
        }
        
        .custom-fullscreen:hover {
            background: #f4f4f4;
        }
        
        /* Combined zoom + fullscreen control */
        .leaflet-control-combined {
            background: white;
            border-radius: 4px;
            border: 1px solid #ccc;
            display: flex;
            flex-direction: row;
            gap: 0;
        }
        
        .control-button {
            width: 26px;
            height: 26px;
            border: none;
            background: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: #555;
            padding: 0;
            line-height: 26px;
            text-align: center;
            transition: background-color 0.2s;
        }
        
        .control-button:not(:last-child) {
            border-right: 1px solid #ddd;
        }
        
        .control-button:hover {
            background-color: #f0f0f0;
        }
        
        .control-button:active {
            background-color: #e0e0e0;
        }

        /* River Point Label Styles */
        .river-point-icon {
            background: transparent;
            border: none;
        }

        .river-point-label {
            background: white;
            padding: 6px 12px;
            border-radius: 10px;
            border: 1px solid #999;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            font-weight: 600;
            font-style: italic;
            color: #000000;
            white-space: nowrap;
            letter-spacing: 0.3px;
            display: inline-block;
        }

        .aoi-label {      
          position: absolute;
          text-align: center;
          transform: translate(-50%, -50%);
          pointer-events: none;
          font-family: 'Roboto', sans-serif;
          font-weight: 800;
          text-shadow: 0 0 2px rgb(255, 255, 255); /* Improves readability */
          font-size: 14px; /* Base size at zoom 14 */
        }

        .aoi-label-name {
            font-family: 'Roboto', sans-serif; /* Google fonts sans-serif */
            color: black;
            font-weight: 800;
            font-size: 14px;
            text-align: center;
            /* White text stroke */
            -webkit-text-stroke: 1px white;
        }    
        .zip-code-label {
            font-family: 'Roboto', sans-serif; /* Google fonts sans-serif */
            font-size: 14px;
            font-weight: 500;
            color: #333; /* Dark gray for better contrast */
            background: rgba(255, 255, 255, 0.9); /* Slightly transparent white */
            padding: 4px 6px;
            border-radius: 6px; /* Pill shape */
            text-align: center;
            letter-spacing: 0.5px; /* Better readability */
            line-height: 1.3; /* Adjust this value (1.2-1.5) */
            display: flex;
            align-items: center;
            justify-content: center;
            }



        /* Hatch pattern for industrial zoning */
        .hatch-pattern {
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 5px,
                black 5px,
                black 10px
            );
        }

        /* Left dashboard layout */
        #left-dashboard {
            position: fixed;
            left: 10px;
            top: 10px;
            width: auto;
            max-width: 500px;
            height: calc(90vh - 20px);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 400;
            pointer-events: none; /* Allow clicks to pass through to map */
        }

        .dashboard-section {
            pointer-events: auto; /* Re-enable clicks for sections */
            background: white;
            border-radius: 5px;
            border: 1px solid #999;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #overlays-section {
            flex-grow: 0;
            height: auto;
            max-height: none;
            overflow: hidden;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
        }

        #overlays-section .leaflet-control-layers-list {
            border: none;
            box-shadow: none;
            background: transparent;
            max-height: none; /* Remove max-height constraint */
            overflow-y: auto;
            font-family: system-ui, sans-serif;
            flex-grow: 1;
        }

        #overlays-section .leaflet-control-layers {
            background: transparent;
            border: none;
            box-shadow: none;
            font-family: system-ui, sans-serif;
            overflow: visible;
            display: flex;
            flex-direction: column;
        }

        /* Base Maps panel styling (unified with overlays) */
        #basemaps-section {
            display: none; /* Hidden by default if needed */
            width: auto;
            max-width: 280px;
            background: white;
            border-radius: 5px;
            border: 1px solid #999;
            overflow: hidden;
        }

        #basemaps-section.active {
            display: block;
            position: fixed;
            top: 10px;
            right: 10px;
            height: calc(90vh - 20px);
            max-height: 80vh;
            z-index: 400;
        }

        #basemaps-section .leaflet-control-layers {
            background: transparent;
            border: none;
            box-shadow: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-height: none;
            overflow: visible;
        }

        #basemaps-section .leaflet-control-layers-list {
            border: none;
            box-shadow: none;
            background: transparent;
            max-height: calc(80vh - 60px);
            overflow-y: auto;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Legend section at bottom */
        #legend-section {
            flex-shrink: 0;
            border-top: 1px solid #999;
            padding: 10px;
            max-height: 40vh; /* Max height to prevent taking too much space */
            overflow-y: auto;
            display: none; /* Hidden by default, shown only when legend layers are active */
            position: relative;
        }

        #legend-section.active {
            display: block;
        }

        /* Collapsed state: fixed height to show only header */
        #legend-section.collapsed {
            max-height: 38px;
            overflow: hidden;
            padding: 5px 10px;
        }

        /* Expanded state: allow content to flow */
        #legend-section:not(.collapsed) {
            display: block;
            padding: 0 10px 10px 10px;
        }

        /* Position header absolutely when expanded to save space */
        #legend-section:not(.collapsed) .legend-header {
            position: absolute;
            top: 10px;
            bottom: 10px;
            right: 10px;
            width: auto;
            margin: 0;
            background: transparent;
            justify-content: flex-end;
        }

        /* Hide legend header when collapsed (show full header) */
        #legend-section.collapsed .legend-header {
            position: static;
            margin-bottom: 0;
        }

        /* Hide legend text when expanded */
        #legend-section:not(.collapsed) .legend-header span {
            display: none;
        }

        /* Hide master legend content when collapsed */
        #legend-section.collapsed .master-legend-content {
            display: none;
        }

        .legend-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 0 8px 0;
            font-size: 14px;
            font-weight: bold;
            color: #444;
            font-family: system-ui, sans-serif;
            letter-spacing: 1px;
            cursor: pointer;
            user-select: none;
        }
        

        .legend-toggle {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        #legend-section.collapsed .legend-toggle::after {
            content: '+';
        }

        #legend-section:not(.collapsed) .legend-toggle::after {
            content: '−';
        }

        .master-legend-content {
            font-size: 13px;
            line-height: 1.6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .master-legend-content i {
            display: inline-block;
            margin-right: 8px;
        }

        .legend-separator {
            height: 2px;
            background-color: #ccc;
            margin: 8px 0;
        }

        /* Scrollbar styling - unified for all panels */
        .leaflet-control-layers-list::-webkit-scrollbar,
        #legend-section::-webkit-scrollbar {
            width: 10px;
            background: rgba(0,0,0,0.05);
        }

        .leaflet-control-layers-list::-webkit-scrollbar-thumb,
        #legend-section::-webkit-scrollbar-thumb {
            background: #999;
            border-radius: 5px;
            border: 2px solid white;
        }

        .leaflet-control-layers-list::-webkit-scrollbar-thumb:hover,
        #legend-section::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

// function to fix styling using geoJSON defined styles
function getStyle(feature) {
    // Custom logic per feature
    return {
        color: feature.properties.color || 'gray',
        weight: feature.properties.weight || 2
    };
}
        // Function to load GeoJSON data
async function loadGeoJSON(url, targetLayer, options = {}) {
  try {
    const response = await fetch(url);
    const data = await response.json();
    
    const geoJsonLayer = L.geoJSON(data, {
      style: options.style || {},
      onEachFeature: options.onEachFeature,
      pointToLayer: options.pointToLayer  // ADD THIS LINE
    });
    
    if (targetLayer && targetLayer.addLayer) {
      targetLayer.addLayer(geoJsonLayer);
    }
    
    return geoJsonLayer;
  } catch (error) {
    console.error('Error loading GeoJSON:', error);
    return null;
  }
}


        // section for rendering ZIP lines (blue lines with white buffer)
const zipCodeLabels = L.layerGroup();//.addTo(map); // Add to map immediately
const zipCodeLayers = L.layerGroup();//.addTo(map);

async function loadZIPLayers() {
  try {
    // add ZIP code white lines (on bottom)
    const whiteOutlines = await loadGeoJSON(
      '/assets/js/zip_codes.geojson',
      null,
      {
        style: {
        color: 'white',
        weight: 5,
        fillOpacity: 0
        }
      }
    );
    zipCodeLayers.addLayer(whiteOutlines); // 


      //add ZIP code blue lines (on top) 
    const blueLines = await loadGeoJSON(
      '/assets/js/zip_codes.geojson',
      null, // Don't auto-add to layer
      {
        style: { // Explicit style object
          color: '#002F6C',
          weight: 2,
          fillOpacity: 0
        },
        onEachFeature: function(feature, layer) {
          const label = L.marker(layer.getBounds().getCenter(), {
            pane: 'labelPane',
            icon: L.divIcon({
              className: 'zip-code-label',
              html: `<div>${feature.properties.CODE}</div>`,
              iconSize: [50, 20]
            }),
            interactive: false
          });
          zipCodeLabels.addLayer(label);
          layer._label = label;
        }
      }
    );
    zipCodeLayers.addLayer(blueLines);

    
  } catch (error) {
    console.error("ZIP code loading failed:", error);
  }
}

// Function to update the master legend in dashboard
function updateMasterLegend() {
    const legendSection = document.getElementById('legend-section');
    const legendContent = document.querySelector('.master-legend-content');
    
    if (Object.keys(activeLegendSections).length === 0) {
        // No active legends - hide the section completely
        legendSection.classList.remove('active');
        legendSection.classList.add('collapsed');
        legendContent.innerHTML = '';
        return;
    }
    
    // Active legends exist - show and expand the section
    legendSection.classList.add('active');
    legendSection.classList.remove('collapsed');
    
    // Rebuild legend content
    if (legendContent) {
        var labels = [];
        var sectionCount = 0;
        for (var layerName in activeLegendSections) {
            if (activeLegendSections[layerName]) {
                // Add separator between sections (but not before first section)
                if (sectionCount > 0) {
                    labels.push('<div class="legend-separator"></div>');
                }
                var section = legendSections[layerName];
                labels.push('<strong>' + section.title + '</strong>');
                section.items.forEach(function(item) {
                    var borderStyle = item.border && item.border !== 'none' ? 'border: ' + item.border + ';' : '';
                    labels.push(
                        '<i style="background: ' + item.color + '; width: 18px; height: 18px; display: inline-block; margin-right: 8px;' + borderStyle + '"></i> ' +
                        item.label
                    );
                });
                sectionCount++;
            }
        }
        // Join labels with <br>, but handle separator specially
        legendContent.innerHTML = labels.map(function(label) {
            return label.includes('legend-separator') ? label : label;
        }).join('<br>').replace(/<br><div class="legend-separator"><\/div><br>/g, '<div class="legend-separator"></div>');
    }
}

// Custom hatch pattern function. CDN issues prevented the use of the leaflet.hatch plugin, so this is a custom SVG implemementation.
function addHatchPattern(layer, options = {}) {
    const angle = options.angle || 45;
    const spacing = options.spacing || 10;
    const weight = options.weight || 2;
    const color = options.color || 'black';
    const opacity = options.opacity || 0.7;
    
    // Create SVG pattern
    const patternId = 'hatch-' + Math.random().toString(36).substr(2, 9);
    const svgNS = "http://www.w3.org/2000/svg";
    
    const pattern = document.createElementNS(svgNS, "pattern");
    pattern.setAttribute("id", patternId);
    pattern.setAttribute("patternUnits", "userSpaceOnUse");
    pattern.setAttribute("width", spacing);
    pattern.setAttribute("height", spacing);
    pattern.setAttribute("patternTransform", `rotate(${angle})`);
    
    const line = document.createElementNS(svgNS, "line");
    line.setAttribute("x1", "0");
    line.setAttribute("y1", "0");
    line.setAttribute("x2", "0");
    line.setAttribute("y2", spacing);
    line.setAttribute("stroke", color);
    line.setAttribute("stroke-width", weight);
    line.setAttribute("opacity", opacity);
    
    pattern.appendChild(line);
    
    // Add to SVG defs or create if doesn't exist
    let defs = document.getElementById('hatch-defs');
    if (!defs) {
        defs = document.createElementNS(svgNS, "defs");
        defs.setAttribute("id", "hatch-defs");
        const svg = document.createElementNS(svgNS, "svg");
        svg.setAttribute("style", "position: absolute; width: 0; height: 0;");
        svg.appendChild(defs);
        document.body.appendChild(svg);
    }
    defs.appendChild(pattern);
    
    // Apply pattern to layer
    const element = layer.getElement();
    if (element) {
        element.style.fill = `url(#${patternId})`;
    }
}

            if (value === 0) {
                opacity = 0; // Transparent
            } else if (value <= 20) {
                opacity = 0.2;
            } else if (value <= 40) {
                opacity = 0.35;
            } else if (value <= 60) {
                opacity = 0.5;
            } else if (value <= 80) {
                opacity = 0.65;
            } else {
                opacity = 0.8;

        // Make basemap control collapsible
        function makeCollapsible(control) {
            const container = control.getContainer();
            L.DomUtil.addClass(container, 'collapsible-control');
            
            // Create toggle button
            const toggle = L.DomUtil.create('div', 'collapse-toggle', container);
            
            // Add click event to toggle collapse
            L.DomEvent.on(toggle, 'click', function(e) {
                L.DomEvent.stopPropagation(e);
                L.DomEvent.preventDefault(e);
                
                if (L.DomUtil.hasClass(container, 'collapsed')) {
                    L.DomUtil.removeClass(container, 'collapsed');
                } else {
                    L.DomUtil.addClass(container, 'collapsed');
                }
            });
            
            return container;
        }

        // Apply collapsible functionality to both panels
        makeCollapsible(basemapControl);
        makeCollapsible(overlayControl);
        
        // Add legend collapse/expand functionality
        const legendSection = document.getElementById('legend-section');
        const legendHeader = legendSection.querySelector('.legend-header');

            e.stopPropagation();
